<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IPDS Detection Pipeline — Flowchart</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #07090f;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 36px 20px 56px;
            background-image:
                radial-gradient(ellipse 60% 40% at 20% 5%, rgba(59, 130, 246, 0.055) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 80% 95%, rgba(16, 185, 129, 0.05) 0%, transparent 60%);
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .badge {
            display: inline-block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.28);
            background: rgba(16, 185, 129, 0.05);
            padding: 4px 14px;
            border-radius: 20px;
            margin-bottom: 12px;
        }

        h1 {
            font-size: clamp(18px, 3vw, 28px);
            font-weight: 800;
            letter-spacing: -0.4px;
            background: linear-gradient(135deg, #e2e8f0 30%, #7a8faf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p.sub {
            color: #5a6680;
            font-size: 13px;
            margin-top: 6px;
        }

        /* LEGEND */
        .legend {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-bottom: 28px;
        }

        .leg {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: #8a9ab8;
        }

        .leg-rect {
            width: 14px;
            height: 10px;
            border-radius: 2px;
        }

        .leg-diamond {
            width: 12px;
            height: 12px;
            transform: rotate(45deg);
            border-radius: 1px;
        }

        .leg-term {
            width: 14px;
            height: 10px;
            border-radius: 8px;
        }

        svg {
            display: block;
            max-width: 100%;
        }

        /* Tooltip */
        .tip {
            position: fixed;
            background: #1e2535;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #dde4f0;
            font-size: 11px;
            font-family: 'JetBrains Mono', monospace;
            padding: 6px 10px;
            border-radius: 6px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s;
            z-index: 999;
            white-space: pre;
            line-height: 1.5;
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="badge">Detection Pipeline</div>
        <h1>IPDS — Pothole Detection Flowchart</h1>
        <p class="sub">Complete algorithmic decision flow from frame capture to data storage</p>
    </div>

    <div class="legend">
        <div class="leg">
            <div class="leg-term" style="background:#1e3a5f;border:1.5px solid #3b82f6"></div>Terminal (Start/End)
        </div>
        <div class="leg">
            <div class="leg-rect" style="background:rgba(59,130,246,0.15);border:1.5px solid #3b82f6"></div>Hardware
            Process
        </div>
        <div class="leg">
            <div class="leg-rect" style="background:rgba(139,92,246,0.15);border:1.5px solid #8b5cf6"></div>Software /
            AI Process
        </div>
        <div class="leg">
            <div class="leg-diamond" style="background:rgba(245,158,11,0.15);border:1.5px solid #f59e0b"></div>Decision
        </div>
        <div class="leg">
            <div class="leg-rect" style="background:rgba(239,68,68,0.15);border:1.5px solid #ef4444"></div>Rejection /
            Discard
        </div>
        <div class="leg">
            <div class="leg-rect" style="background:rgba(16,185,129,0.15);border:1.5px solid #10b981"></div>Storage /
            Output
        </div>
    </div>

    <svg id="flowchart" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 2340" width="760">
        <defs>
            <!-- Arrow markers -->
            <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5"
                orient="auto-start-reverse">
                <path d="M0,1 L9,5 L0,9 Z" fill="rgba(255,255,255,0.28)" />
            </marker>
            <marker id="arr-y" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5"
                orient="auto-start-reverse">
                <path d="M0,1 L9,5 L0,9 Z" fill="rgba(245,158,11,0.7)" />
            </marker>
            <marker id="arr-r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5"
                orient="auto-start-reverse">
                <path d="M0,1 L9,5 L0,9 Z" fill="rgba(239,68,68,0.7)" />
            </marker>
            <marker id="arr-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5"
                orient="auto-start-reverse">
                <path d="M0,1 L9,5 L0,9 Z" fill="rgba(16,185,129,0.7)" />
            </marker>
            <!-- Glow filters -->
            <filter id="glow-b">
                <feGaussianBlur stdDeviation="3" result="blur" />
                <feMerge>
                    <feMergeNode in="blur" />
                    <feMergeNode in="SourceGraphic" />
                </feMerge>
            </filter>
            <filter id="glow-g">
                <feGaussianBlur stdDeviation="3" result="blur" />
                <feMerge>
                    <feMergeNode in="blur" />
                    <feMergeNode in="SourceGraphic" />
                </feMerge>
            </filter>
        </defs>

        <!-- ═══════════════════════════════════════════
       HELPER: cx=380 is the center column
       Node width: process=220, decision=200 (diamond), terminal=180
  ══════════════════════════════════════════════ -->

        <!-- ── COLUMN GUIDE LINES (invisible) cx=380 ── -->

        <!-- ─── NODE 1: START ─── y=30 -->
        <!-- Terminal pill -->
        <rect x="280" y="30" width="200" height="44" rx="22" fill="#0f1929" stroke="#3b82f6" stroke-width="1.5"
            filter="url(#glow-b)" />
        <text x="380" y="56" text-anchor="middle" dominant-baseline="middle" font-family="Inter" font-size="13"
            font-weight="700" fill="#93c5fd">
            SYSTEM START
        </text>

        <!-- arrow -->
        <line x1="380" y1="74" x2="380" y2="104" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"
            marker-end="url(#arr)" />

        <!-- ─── NODE 2: ESP32-CAM captures frame ─── y=104 -->
        <rect x="260" y="104" width="240" height="52" rx="6" fill="rgba(59,130,246,0.12)" stroke="#3b82f6"
            stroke-width="1.5" />
        <text x="380" y="124" text-anchor="middle" font-family="Inter" font-size="12" font-weight="600"
            fill="#bfdbfe">ESP32-CAM</text>
        <text x="380" y="142" text-anchor="middle" font-family="JetBrains Mono" font-size="10"
            fill="rgba(191,219,254,0.6)">OV2640 capture → JPEG (DMA)</text>

        <!-- arrow -->
        <line x1="380" y1="156" x2="380" y2="186" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"
            marker-end="url(#arr)" />

        <!-- ─── NODE 3: WiFi MJPEG stream ─── y=186 -->
        <rect x="260" y="186" width="240" height="52" rx="6" fill="rgba(6,182,212,0.1)" stroke="#06b6d4"
            stroke-width="1.5" />
        <text x="380" y="206" text-anchor="middle" font-family="Inter" font-size="12" font-weight="600"
            fill="#a5f3fc">WiFi Transport</text>
        <text x="380" y="224" text-anchor="middle" font-family="JetBrains Mono" font-size="10"
            fill="rgba(165,243,252,0.6)">MJPEG over 802.11 · LAN</text>

        <!-- arrow -->
        <line x1="380" y1="238" x2="380" y2="268" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"
            marker-end="url(#arr)" />

        <!-- ─── NODE 4: Python OpenCV decode ─── y=268 -->
        <rect x="260" y="268" width="240" height="52" rx="6" fill="rgba(139,92,246,0.1)" stroke="#8b5cf6"
            stroke-width="1.5" />
        <text x="380" y="288" text-anchor="middle" font-family="Inter" font-size="12" font-weight="600"
            fill="#c4b5fd">Python / OpenCV</text>
        <text x="380" y="306" text-anchor="middle" font-family="JetBrains Mono" font-size="10"
            fill="rgba(196,181,253,0.6)">cv2.VideoCapture → np.ndarray</text>

        <!-- arrow -->
        <line x1="380" y1="320" x2="380" y2="350" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"
            marker-end="url(#arr)" />

        <!-- ─── NODE 5: YOLOv8 Inference ─── y=350 -->
        <rect x="260" y="350" width="240" height="52" rx="6" fill="rgba(139,92,246,0.1)" stroke="#8b5cf6"
            stroke-width="1.5" />
        <text x="380" y="370" text-anchor="middle" font-family="Inter" font-size="12" font-weight="600"
            fill="#c4b5fd">YOLOv8-Nano Inference</text>
        <text x="380" y="388" text-anchor="middle" font-family="JetBrains Mono" font-size="10"
            fill="rgba(196,181,253,0.6)">detector.py · Forward Pass CNN</text>

        <!-- arrow -->
        <line x1="380" y1="402" x2="380" y2="442" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"
            marker-end="url(#arr)" />

        <!-- ─── DECISION 1: Any detections? ─── y=442 (diamond) -->
        <!-- Diamond: rotated square, center=(380,472), half=36 -->
        <polygon points="380,442 420,472 380,502 340,472" fill="rgba(245,158,11,0.1)" stroke="#f59e0b"
            stroke-width="1.5" />
        <text x="380" y="469" text-anchor="middle" font-family="Inter" font-size="11" font-weight="600"
            fill="#fde68a">Any</text>
        <text x="380" y="483" text-anchor="middle" font-family="Inter" font-size="11" font-weight="600"

        <!-- NO → left reject -->
        <line x1="340" y1="472" x2="200" y2="472" stroke="rgba(239,68,68,0.6)" stroke-width="1.5"

        <text x="330" y="465" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#f87171">No</text>

            stroke-width="1.2" />
        <text x="150" y="476" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#fca5a5">Discard
            frame</text>

        <!-- Reject → loop back up arrow -->
        <path d="M100,472 Q60,472 60,200 Q60,74 270,74" fill="none" stroke="rgba(239,68,68,0.3)" stroke-width="1"
            stroke-dasharray="4 3" marker-end="url(#arr-r)" />
        <text x="48" y="270" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="rgba(239,68,68,0.5)"
            transform="rotate(-90,48,270)">Next Frame</text>

        <!-- YES → down -->
        <line x1="380" y1="502" x2="380" y2="532" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"
            marker-end="url(#arr)" />
        <text x="393" y="520" font-family="JetBrains Mono" font-size="9" fill="#86efac">Yes</text>

        <!-- ─── DECISION 2: conf ≥ 0.25? ─── y=532 -->
        <polygon points="380,532 420,562 380,592 340,562" fill="rgba(245,158,11,0.1)" stroke="#f59e0b"
            stroke-width="1.5" />
        <text x="380" y="558" text-anchor="middle" font-family="Inter" font-size="11" font-weight="600"
            fill="#fde68a">conf ≥ 0.25?</text>
        <text x="380" y="571" text-anchor="middle" font-family="JetBrains Mono" font-size="9"
            fill="rgba(253,230,138,0.6)">threshold</text>

        <!-- NO reject right -->
        <line x1="420" y1="562" x2="560" y2="562" stroke="rgba(239,68,68,0.6)" stroke-width="1.5"
            marker-end="url(#arr-r)" />
        <text x="488" y="555" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#f87171">No</text>
        <rect x="560" y="544" width="110" height="36" rx="5" fill="rgba(239,68,68,0.1)" stroke="#ef4444"
            stroke-width="1.2" />
        <text x="615" y="566" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#fca5a5">Low conf /
            skip</text>

        <!-- YES → down -->
        <line x1="380" y1="592" x2="380" y2="622" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"
            marker-end="url(#arr)" />
        <text x="393" y="610" font-family="JetBrains Mono" font-size="9" fill="#86efac">Yes</text>

        <!-- ─── NODE 6: SORT Kalman tracking ─── y=622 -->
        <rect x="260" y="622" width="240" height="52" rx="6" fill="rgba(139,92,246,0.1)" stroke="#8b5cf6"
            stroke-width="1.5" />
        <text x="380" y="642" text-anchor="middle" font-family="Inter" font-size="12" font-weight="600"
            fill="#c4b5fd">SORT Kalman Filter</text>
        <text x="380" y="660" text-anchor="middle" font-family="JetBrains Mono" font-size="10"
            fill="rgba(196,181,253,0.6)">sort.py · Hungarian match · ID assign</text>

        <!-- arrow -->
        <line x1="380" y1="674" x2="380" y2="714" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"
            marker-end="url(#arr)" />

        <!-- ─── DECISION 3: Area ratio > 0.25? ─── y=714 -->
        <polygon points="380,714 420,744 380,774 340,744" fill="rgba(245,158,11,0.1)" stroke="#f59e0b"
            stroke-width="1.5" />
        <text x="380" y="740" text-anchor="middle" font-family="Inter" font-size="11" font-weight="600"
            fill="#fde68a">area_ratio</text>
        <text x="380" y="754" text-anchor="middle" font-family="Inter" font-size="11" font-weight="600"
            fill="#fde68a">&gt; 0.25?</text>

        <!-- YES → reject (large object) right -->
        <line x1="420" y1="744" x2="560" y2="744" stroke="rgba(239,68,68,0.6)" stroke-width="1.5"
            marker-end="url(#arr-r)" />
        <text x="488" y="737" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#f87171">Yes</text>
        <rect x="560" y="726" width="120" height="36" rx="5" fill="rgba(239,68,68,0.1)" stroke="#ef4444"
            stroke-width="1.2" />
        <text x="620" y="744" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#fca5a5">Reject:
            large obj</text>
        <text x="620" y="756" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#fca5a5">(truck /
            bridge shadow)</text>

        <!-- NO → down -->
        <line x1="380" y1="774" x2="380" y2="804" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"
            marker-end="url(#arr)" />
        <text x="393" y="792" font-family="JetBrains Mono" font-size="9" fill="#86efac">No</text>

        <!-- ─── DECISION 4: aspect_ratio > 3.0? ─── y=804 -->
        <polygon points="380,804 420,834 380,864 340,834" fill="rgba(245,158,11,0.1)" stroke="#f59e0b"
            stroke-width="1.5" />
        <text x="380" y="830" text-anchor="middle" font-family="Inter" font-size="11" font-weight="600"
            fill="#fde68a">aspect_ratio</text>
        <text x="380" y="844" text-anchor="middle" font-family="Inter" font-size="11" font-weight="600"
            fill="#fde68a">&gt; 3.0?</text>

        <!-- YES reject right -->
        <line x1="420" y1="834" x2="560" y2="834" stroke="rgba(239,68,46,0.6)" stroke-width="1.5"
            marker-end="url(#arr-r)" />
        <text x="488" y="827" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#f87171">Yes</text>
        <rect x="560" y="816" width="120" height="36" rx="5" fill="rgba(239,68,68,0.1)" stroke="#ef4444"
            stroke-width="1.2" />
        <text x="620" y="834" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#fca5a5">Reject:
            crack / bump</text>
        <text x="620" y="846" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#fca5a5">(speed bump
            / tar snake)</text>

        <!-- NO → down -->
        <line x1="380" y1="864" x2="380" y2="894" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"
            marker-end="url(#arr)" />
        <text x="393" y="882" font-family="JetBrains Mono" font-size="9" fill="#86efac">No</text>

        <!-- ─── DECISION 5: Stationary > 10 frames? ─── y=894 -->
        <polygon points="380,894 420,924 380,954 340,924" fill="rgba(245,158,11,0.1)" stroke="#f59e0b"
            stroke-width="1.5" />
        <text x="380" y="920" text-anchor="middle" font-family="Inter" font-size="11" font-weight="600"
            fill="#fde68a">Static &gt; 10</text>
        <text x="380" y="934" text-anchor="middle" font-family="Inter" font-size="11" font-weight="600"
            fill="#fde68a">frames?</text>

        <!-- YES reject right -->
        <line x1="420" y1="924" x2="560" y2="924" stroke="rgba(239,68,46,0.6)" stroke-width="1.5"
            marker-end="url(#arr-r)" />
        <text x="488" y="917" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#f87171">Yes</text>
        <rect x="560" y="906" width="120" height="36" rx="5" fill="rgba(239,68,68,0.1)" stroke="#ef4444"

        <text x="620" y="924" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#fca5a5">Reject:

        <text x="620" y="936" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#fca5a5">(car

        <!-- NO → down -->

        <text x="393" y="972" font-family="JetBrains Mono" font-size="9" fill="#86efac">No</text>

        <!-- ─── DECISION 6: Already logged? ─── y=984 -->
        <polygon points="380,984 420,1014 380,1044 340,1014" fill="rgba(245,158,11,0.1)" stroke="#f59e0b"
            stroke-width="1.5" />
        <text x="380" y="1010" text-anchor="middle" font-family="Inter" font-size="11" font-weight="600"
            fill="#fde68a">track_id in</text>
        <text x="380" y="1024" text-anchor="middle" font-family="Inter" font-size="11" font-weight="600"

        <!-- YES reject right (duplicate) -->
        <line x1="420" y1="1014" x2="560" y2="1014" stroke="rgba(239,68,46,0.6)" stroke-width="1.5"
            marker-end="url(#arr-r)" />
        <text x="488" y="1007" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#f87171">Yes</text>
        <rect x="560" y="996" width="120" height="36" rx="5" fill="rgba(239,68,68,0.1)" stroke="#ef4444"

        <text x="620" y="1014" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#fca5a5">Skip:
            duplicate ID</text>
        <text x="620" y="1026" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#fca5a5">(already
            logged)</text>

        <!-- NO → down -->
        <line x1="380" y1="1044" x2="380" y2="1074" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"
            marker-end="url(#arr)" />
        <text x="393" y="1062" font-family="JetBrains Mono" font-size="9" fill="#86efac">No</text>

        <!-- ─── NODE 7: Track centroid ─── y=1074 -->
        <rect x="260" y="1074" width="240" height="52" rx="6" fill="rgba(139,92,246,0.1)" stroke="#8b5cf6"
            stroke-width="1.5" />
        <text x="380" y="1094" text-anchor="middle" font-family="Inter" font-size="12" font-weight="600"
            fill="#c4b5fd">Track Centroid (cy)</text>
        <text x="380" y="1112" text-anchor="middle" font-family="JetBrains Mono" font-size="10"
            fill="rgba(196,181,253,0.6)">tracker.py · Kalman predict loop</text>

        <!-- arrow -->
        <line x1="380" y1="1126" x2="380" y2="1166" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"

        <!-- ─── DECISION 7: cy ≥ ref_y? ─── y=1166 -->
        <polygon points="380,1166 430,1204 380,1242 330,1204" fill="rgba(245,158,11,0.1)" stroke="#f59e0b"

        <text x="380" y="1196" text-anchor="middle" font-family="Inter" font-size="12" font-weight="700"

        <text x="380" y="1212" text-anchor="middle" font-family="JetBrains Mono" font-size="9"

        <!-- NO → left loop wait -->
        <line x1="330" y1="1204" x2="200" y2="1204" stroke="rgba(245,158,11,0.5)" stroke-width="1.5"

        <text x="268" y="1197" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#fcd34d">No</text>
        <path d="M200,1204 Q160,1204 160,1100 Q160,1060 260,1060" fill="none" stroke="rgba(245,158,11,0.25)"

        <text x="148" y="1140" text-anchor="middle" font-family="JetBrains Mono" font-size="9"
            fill="rgba(245,158,11,0.5)" transform="rotate(-90,148,1140)">Next frame</text>

        <!-- YES → down / TRIGGER -->
